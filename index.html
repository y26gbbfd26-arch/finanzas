<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A1410" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="economízalo" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="icon" type="image/png" href="./icon-192.png" />

  <title>economízalo</title>

  <style>
    html, body { margin: 0; padding: 0; background: #0A0E17; overscroll-behavior: none; }
    body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    #root { min-height: 100vh; }
    .loader {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: #74C69D; font-family: monospace; font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loader">cargando…</div>
  </div>

  <!-- React desde CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel para compilar JSX directamente en el navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- La app -->
  <script type="text/babel" data-type="module" src="./app.jsx"></script>

  <!-- Registrar service worker y detectar actualizaciones -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const reg = await navigator.serviceWorker.register("./service-worker.js");
          console.log("SW registrado", reg.scope);

          // Forzar comprobación de actualización cada vez que se abre la app
          reg.update();

          // Si encuentra una nueva versión esperando, activarla
          if (reg.waiting) reg.waiting.postMessage({ type: "SKIP_WAITING" });

          // Si llega una nueva versión durante la sesión, recargar para usarla
          reg.addEventListener("updatefound", () => {
            const nuevo = reg.installing;
            if (!nuevo) return;
            nuevo.addEventListener("statechange", () => {
              if (nuevo.state === "installed" && navigator.serviceWorker.controller) {
                nuevo.postMessage({ type: "SKIP_WAITING" });
              }
            });
          });

          // Cuando el SW toma control de una versión nueva, recargar la página
          let recargando = false;
          navigator.serviceWorker.addEventListener("controllerchange", () => {
            if (recargando) return;
            recargando = true;
            window.location.reload();
          });
        } catch (err) {
          console.error("SW error", err);
        }
      });
    }
  </script>
</body>
</html>
